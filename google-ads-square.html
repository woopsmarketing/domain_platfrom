<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 1200px; }
.container {
  width: 1200px;
  height: 1200px;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
  overflow: hidden;
}
.accent {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
}
.glow-1 {
  position: absolute;
  top: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
}
.glow-2 {
  position: absolute;
  bottom: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
}
.logo {
  margin-bottom: 48px;
}
.title {
  font-size: 64px;
  font-weight: 800;
  color: white;
  letter-spacing: -1px;
  margin-bottom: 20px;
  text-align: center;
}
.highlight {
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 28px;
  color: #94a3b8;
  margin-bottom: 48px;
  text-align: center;
}
.badges {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
.badges-row2 {
  display: flex;
  gap: 12px;
  margin-bottom: 56px;
}
.badge {
  padding: 12px 28px;
  border-radius: 100px;
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.25);
  color: #60a5fa;
  font-size: 20px;
  font-weight: 600;
}
.cta {
  padding: 20px 60px;
  border-radius: 14px;
  background: #3b82f6;
  color: white;
  font-size: 24px;
  font-weight: 700;
}
.url {
  position: absolute;
  bottom: 48px;
  font-size: 18px;
  color: #64748b;
}
.free-badge {
  position: absolute;
  top: 32px;
  right: 32px;
  padding: 8px 20px;
  border-radius: 100px;
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: #34d399;
  font-size: 16px;
  font-weight: 700;
}
</style>
</head>
<body>
<div class="container">
  <div class="accent"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="free-badge">완전 무료</div>

  <svg width="80" height="80" viewBox="0 0 32 32" fill="none" class="logo">
    <circle cx="13" cy="13" r="10" stroke="#3b82f6" stroke-width="2.5"/>
    <line x1="20.5" y1="20.5" x2="29" y2="29" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <div class="title">도메인 <span class="highlight">DA·DR·TF</span><br>무료 분석</div>
  <div class="subtitle">도메인명만 입력하면 즉시 확인</div>

  <div class="badges">
    <span class="badge">Moz DA</span>
    <span class="badge">Ahrefs DR</span>
    <span class="badge">Majestic TF</span>
  </div>
  <div class="badges-row2">
    <span class="badge">실시간 경매</span>
    <span class="badge">Whois 조회</span>
    <span class="badge">거래 이력</span>
  </div>

  <div class="cta">무료로 분석하기</div>

  <div class="url">domainchecker.co.kr</div>
</div>
</body>
</html>
