<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 628px; }
.container {
  width: 1200px;
  height: 628px;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
  overflow: hidden;
}
.accent {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
}
.glow-1 {
  position: absolute;
  top: -100px;
  left: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
}
.glow-2 {
  position: absolute;
  bottom: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
}
.logo {
  margin-bottom: 32px;
}
.title {
  font-size: 56px;
  font-weight: 800;
  color: white;
  letter-spacing: -1px;
  margin-bottom: 16px;
}
.highlight {
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 24px;
  color: #94a3b8;
  margin-bottom: 40px;
}
.badges {
  display: flex;
  gap: 12px;
  margin-bottom: 48px;
}
.badge {
  padding: 10px 24px;
  border-radius: 100px;
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.25);
  color: #60a5fa;
  font-size: 18px;
  font-weight: 600;
}
.cta {
  padding: 16px 48px;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.url {
  position: absolute;
  bottom: 32px;
  font-size: 16px;
  color: #64748b;
}
</style>
</head>
<body>
<div class="container">
  <div class="accent"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <svg width="64" height="64" viewBox="0 0 32 32" fill="none" class="logo">
    <circle cx="13" cy="13" r="10" stroke="#3b82f6" stroke-width="2.5"/>
    <line x1="20.5" y1="20.5" x2="29" y2="29" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <div class="title">도메인 <span class="highlight">DA·DR·TF</span> 무료 분석</div>
  <div class="subtitle">도메인명만 입력하면 SEO 지수를 즉시 확인</div>

  <div class="badges">
    <span class="badge">Moz DA</span>
    <span class="badge">Ahrefs DR</span>
    <span class="badge">Majestic TF</span>
    <span class="badge">실시간 경매</span>
    <span class="badge">Whois</span>
  </div>

  <div class="cta">무료로 분석하기</div>

  <div class="url">domainchecker.co.kr</div>
</div>
</body>
</html>
